<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITÁCORA - Xelonia Uptime</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@300;400;500;600;700"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 2rem;
            color: #3b82f6;
        }

        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            color: white;
            border: 2px solid #334155;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        input[type="date"] {
            padding: 8px 12px;
            background: #0f172a;
            color: white;
            border: 2px solid #334155;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .entrada-item {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #3b82f6;
        }

        .entrada-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        .entrada-texto {
            line-height: 1.5;
        }

        .recordatorio-badge {
            background: #f59e0b;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status {
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        #fecha-container {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📝 BITÁCORA - Versión Standalone</h1>

        <div class="status" id="status">
            ✅ Sistema cargado<br>
            📍 Usando localStorage independiente (clave: BITACORA_STANDALONE)<br>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 15px;">Nueva Entrada</h3>
            <textarea id="texto" placeholder="Escribe tu entrada aquí..."></textarea>

            <div class="checkbox-group">
                <input type="checkbox" id="esRecordatorio" onchange="toggleFecha()">
                <label for="esRecordatorio">Marcar como recordatorio</label>
            </div>

            <div id="fecha-container">
                <input type="date" id="fechaRecordatorio">
            </div>

            <button class="btn" onclick="guardar()" style="width: 100%; margin-top: 15px;">
                💾 GUARDAR
            </button>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 15px;">Entradas Guardadas (<span id="count">0</span>)</h3>
            <div id="lista"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'BITACORA_STANDALONE';

        function addStatus(msg) {
            const status = document.getElementById('status');
            const timestamp = new Date().toLocaleTimeString();
            status.innerHTML += `[${timestamp}] ${msg}<br>`;
        }

        function toggleFecha() {
            const container = document.getElementById('fecha-container');
            const checkbox = document.getElementById('esRecordatorio');

            if (checkbox.checked) {
                container.style.display = 'block';
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('fechaRecordatorio').value = today;
            } else {
                container.style.display = 'none';
            }
        }

        function guardar() {
            const texto = document.getElementById('texto').value.trim();

            if (!texto) {
                alert('⚠️ Debes escribir algo primero');
                return;
            }

            addStatus('🔵 Guardando...');

            try {
                // Leer existentes
                const guardado = localStorage.getItem(STORAGE_KEY);
                const lista = guardado ? JSON.parse(guardado) : [];

                // Crear nueva
                const ahora = new Date();
                const esRecordatorio = document.getElementById('esRecordatorio').checked;

                const nueva = {
                    id: Date.now(),
                    contenido: texto,
                    fecha: ahora.toISOString().split('T')[0],
                    hora: ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }),
                    timestamp: ahora.toISOString(),
                    esRecordatorio: esRecordatorio,
                    fechaRecordatorio: esRecordatorio ? document.getElementById('fechaRecordatorio').value : null,
                    completado: false
                };

                lista.unshift(nueva);

                // Guardar
                localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));

                // Verificar
                const verificar = localStorage.getItem(STORAGE_KEY);
                if (verificar) {
                    addStatus(`✅ GUARDADO! Total: ${lista.length} entradas`);
                    alert('✅ Entrada guardada exitosamente\n\nAhora CIERRA esta ventana y vuelve a abrirla para verificar.');
                } else {
                    addStatus('❌ ERROR: No se pudo verificar guardado');
                }

                // Limpiar
                document.getElementById('texto').value = '';
                document.getElementById('esRecordatorio').checked = false;
                toggleFecha();

                // Recargar vista
                cargar();

            } catch (e) {
                addStatus('❌ ERROR: ' + e.message);
                alert('❌ Error: ' + e.message);
            }
        }

        function cargar() {
            addStatus('🟢 Cargando entradas...');

            try {
                const guardado = localStorage.getItem(STORAGE_KEY);

                if (!guardado) {
                    addStatus('⚠️ No hay entradas guardadas');
                    document.getElementById('lista').innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 2rem;">No hay entradas</p>';
                    document.getElementById('count').textContent = '0';
                    return;
                }

                const lista = JSON.parse(guardado);
                addStatus(`✅ Cargadas ${lista.length} entradas`);
                document.getElementById('count').textContent = lista.length;

                let html = '';
                lista.forEach(e => {
                    html += `
                        <div class="entrada-item">
                            <div class="entrada-header">
                                <span>${e.fecha} - ${e.hora}</span>
                                ${e.esRecordatorio ? `<span class="recordatorio-badge">📅 ${e.fechaRecordatorio}</span>` : ''}
                            </div>
                            <div class="entrada-texto">${e.contenido}</div>
                        </div>
                    `;
                });

                document.getElementById('lista').innerHTML = html;

            } catch (e) {
                addStatus('❌ ERROR al cargar: ' + e.message);
            }
        }

        // Auto-cargar al iniciar
        window.onload = function () {
            addStatus('✅ Aplicación iniciada');

            // Verificar localStorage
            try {
                localStorage.setItem('test', '1');
                localStorage.removeItem('test');
                addStatus('✅ localStorage disponible');
            } catch (e) {
                addStatus('❌ localStorage NO disponible: ' + e.message);
            }

            cargar();
        };
    </script>
</body>

</html>
