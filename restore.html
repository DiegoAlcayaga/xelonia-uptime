<!DOCTYPE html>
<html>

<head>
    <title>Restaurar Técnicos XELONIA</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #0f172a;
            color: white;
        }

        button {
            padding: 20px 40px;
            font-size: 18px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #059669;
        }

        #status {
            margin-top: 20px;
            font-family: monospace;
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
    </style>
</head>

<body>
    <h1>🔧 Restaurar Técnicos XELONIA</h1>
    <p>Este script restaurará los 3 técnicos que tenías configurados.</p>

    <button onclick="restoreTechnicians()">🔄 RESTAURAR AHORA</button>

    <div id="status"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNxljt7NvCl0JREp30f4fLHPD8m4L35s4",
            authDomain: "xelonia-uptime-app.firebaseapp.com",
            projectId: "xelonia-uptime-app",
            storageBucket: "xelonia-uptime-app.firebasestorage.app",
            messagingSenderId: "113362614608",
            appId: "1:113362614608:web:3145603b7d56f8d59c9455",
            measurementId: "G-YSBPE26SHT"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function restoreTechnicians() {
            const status = document.getElementById('status');
            status.innerHTML = '⏳ Iniciando restauración...<br><br>';

            // Estos son los 3 técnicos basados en tu captura
            const tecnicos = [
                {
                    id: 1,
                    nombre: "Supervisor",
                    iniciales: "AD",
                    rol: "admin",
                    password: "1234",
                    cargo: "ADMINISTRADOR",
                    color: "#f59e0b",
                    activo: true,
                    skills: []
                },
                {
                    id: 2,
                    nombre: "Juan Pérez",
                    iniciales: "JP",
                    rol: "tecnico",
                    password: "1234",
                    cargo: "Carlos",
                    color: "#3b82f6",
                    activo: true,
                    skills: []
                },
                {
                    id: 3,
                    nombre: "Técnico 3",
                    iniciales: "T3",
                    rol: "tecnico",
                    password: "1234",
                    cargo: "Técnico",
                    color: "#10b981",
                    activo: true,
                    skills: []
                }
            ];

            try {
                // Restaurar a Firestore
                status.innerHTML += '☁️ Subiendo a Firestore...<br>';

                for (const tecnico of tecnicos) {
                    await db.collection('tecnicos').doc(String(tecnico.id)).set(tecnico);
                    status.innerHTML += `✅ ${tecnico.nombre} restaurado<br>`;
                }

                // Guardar también en localStorage
                status.innerHTML += '<br>💾 Guardando en localStorage...<br>';
                localStorage.setItem('cmms_tecnicos', JSON.stringify(tecnicos));
                status.innerHTML += '✅ Guardado localmente<br>';

                status.innerHTML += '<br><strong style="color: #10b981; font-size: 20px;">🎉 RESTAURACIÓN COMPLETADA</strong><br><br>';
                status.innerHTML += '✅ 3 técnicos restaurados exitosamente<br>';
                status.innerHTML += '<br>📱 <strong>AHORA:</strong><br>';
                status.innerHTML += '1. Cierra esta ventana<br>';
                status.innerHTML += '2. Ve a la app principal<br>';
                status.innerHTML += '3. Presiona <strong>Ctrl + Shift + R</strong> para recargar<br>';

            } catch (error) {
                status.innerHTML += `<br><span style="color: #ef4444;">❌ ERROR: ${error.message}</span><br>`;
                status.innerHTML += `<pre>${error.stack}</pre>`;
                console.error(error);
            }
        }
    </script>
</body>

</html>
